name: PR Preview Cleanup

on:
  pull_request:
    branches: [main]
    types: [closed]

concurrency:
  group: listen-preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  cleanup:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Check cleanup configuration
        id: cleanup_config
        env:
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          if [ -n "$RAILWAY_PROJECT_ID" ] && [ -n "$RAILWAY_API_TOKEN" ]; then
            echo "can_cleanup=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_cleanup=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Delete preview backend environment
        if: steps.cleanup_config.outputs.can_cleanup == 'true'
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
        run: |
          set -euo pipefail

          railway_graphql() {
            local query="$1"
            local variables="$2"
            local response

            response=$(jq -n \
              --arg query "$query" \
              --argjson variables "$variables" \
              '{query: $query, variables: $variables}' | \
              curl -fsS https://backboard.railway.com/graphql/v2 \
                -H "Authorization: Bearer ${RAILWAY_API_TOKEN}" \
                -H "Content-Type: application/json" \
                --data-binary @-)

            if [ "$(printf '%s' "$response" | jq '.errors | length')" != "0" ]; then
              printf '%s\n' "$response" | jq -r '.errors[].message' >&2
              return 1
            fi

            printf '%s' "$response"
          }

          PROJECT_QUERY=$(cat <<'GRAPHQL'
          query Project($id: String!) {
            project(id: $id) {
              environments {
                edges {
                  node {
                    id
                    name
                    deletedAt
                  }
                }
              }
            }
          }
          GRAPHQL
          )
          PROJECT_JSON=$(railway_graphql "$PROJECT_QUERY" "$(jq -n --arg id "$RAILWAY_PROJECT_ID" '{id: $id}')")
          ENVIRONMENT_ID=$(printf '%s' "$PROJECT_JSON" | jq -r \
            --arg env "pr-${{ github.event.pull_request.number }}" \
            '[.data.project.environments.edges[].node | select(.deletedAt == null and .name == $env)][0].id // empty')

          if [ -z "$ENVIRONMENT_ID" ]; then
            echo "Railway preview environment already absent."
            exit 0
          fi

          ENVIRONMENT_DELETE_MUTATION=$(cat <<'GRAPHQL'
          mutation EnvironmentDelete($id: String!) {
            environmentDelete(id: $id)
          }
          GRAPHQL
          )
          railway_graphql "$ENVIRONMENT_DELETE_MUTATION" "$(jq -n --arg id "$ENVIRONMENT_ID" '{id: $id}')" >/dev/null

      - name: Comment cleanup
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const configured = '${{ steps.cleanup_config.outputs.can_cleanup }}' === 'true';
            const envName = 'pr-${{ github.event.pull_request.number }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: configured
                ? `TC-1367 preview cleanup ran for Railway environment \`${envName}\`. Cloudflare Pages keeps aliased branch deployments; delete old deployments from Cloudflare if retention needs tighter cleanup.`
                : `TC-1367 preview cleanup skipped because Railway repository configuration is incomplete. Expected Railway environment: \`${envName}\`.`,
            });
