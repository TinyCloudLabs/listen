name: PR Preview Cleanup

on:
  pull_request:
    branches: [main]
    types: [closed]

concurrency:
  group: listen-preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  cleanup:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Install Phala CLI
        run: npm install -g phala

      - name: Delete preview backend CVM
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
        run: phala cvms delete "listen-pr-${{ github.event.pull_request.number }}" --yes

      - name: Comment cleanup
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'TC-1367 preview cleanup ran for Phala CVM `listen-pr-${{ github.event.pull_request.number }}`. Cloudflare Pages keeps aliased branch deployments; delete old deployments from Cloudflare if retention needs tighter cleanup.',
            });
