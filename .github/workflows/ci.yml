name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Build
        run: bun run build

      - name: Test (backend)
        run: bun test packages/ examples/react-express/backend examples/conversation-sync/backend

      - name: Test (frontend)
        run: cd examples/conversation-sync/frontend && bunx vitest run
