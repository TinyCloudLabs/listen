name: Deploy Backend to Phala Cloud

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "packages/**"
      - "backend/Dockerfile"
      - "docker-compose.phala.yml"
      - "package.json"
      - "bun.lock"
      - "frontend/package.json"
      - "tsconfig.base.json"
      - "turbo.json"
      - ".github/workflows/deploy-backend-phala.yml"
  workflow_dispatch:

env:
  DOCKER_IMAGE: ${{ vars.LISTEN_BACKEND_IMAGE || 'ghcr.io/tinycloudlabs/listen-backend' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Check deployment configuration
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
        run: |
          missing=()
          for item in PHALA_CLOUD_API_KEY; do
            if [ -z "${!item}" ]; then
              missing+=("$item")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required GitHub Actions secrets: ${missing[*]}" >&2
            exit 1
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/amd64
          push: true
          no-cache: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
            ${{ env.DOCKER_IMAGE }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Listen backend

      - name: Pin deployed image tag
        run: sed -i "s|\${LISTEN_BACKEND_IMAGE:-ghcr.io/tinycloudlabs/listen-backend:latest}|${{ env.DOCKER_IMAGE }}:${{ github.sha }}|g" docker-compose.phala.yml

      - name: Install Phala CLI
        run: npm install -g phala

      - name: Get CVM ID by name
        id: cvm
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
        run: |
          CVM_APP_ID=$(phala cvms list --json | jq -r '.items[] | select(.cvmName == "listen-backend") | .appId')
          if [ -z "$CVM_APP_ID" ]; then
            echo "Error: CVM 'listen-backend' not found"
            exit 1
          fi
          echo "app_id=app_${CVM_APP_ID}" >> "$GITHUB_OUTPUT"
          echo "Found CVM: app_${CVM_APP_ID}"

      - name: Deploy to Phala Cloud
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
        run: phala deploy --cvm-id ${{ steps.cvm.outputs.app_id }} -c docker-compose.phala.yml

      - name: Wait for deployment
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
        run: |
          echo "Waiting for CVM to be ready (up to 10 minutes)..."
          for i in {1..60}; do
            RAW=$(phala cvms list --json | jq '.items[] | select(.cvmName == "listen-backend") | {status, cvmName}')
            STATUS=$(echo "$RAW" | jq -r '.status')
            echo "Attempt $i/60: Status = '$STATUS'"
            if [ "$STATUS" = "running" ]; then
              echo "CVM is running"
              exit 0
            fi
            if [ "$STATUS" = "failed" ] || [ "$STATUS" = "error" ]; then
              echo "CVM deployment failed with status: $STATUS"
              phala cvms list --json | jq '.items[] | select(.cvmName == "listen-backend")'
              exit 1
            fi
            sleep 10
          done
          echo "Timeout waiting for CVM after 10 minutes"
          phala cvms list --json | jq '.items[] | select(.cvmName == "listen-backend")'
          exit 1

  phala-status:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Publish Phala deployment status
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          TARGET_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          case "$DEPLOY_RESULT" in
            success)
              STATE=success
              DESCRIPTION="Phala deployment succeeded"
              ;;
            cancelled)
              STATE=error
              DESCRIPTION="Phala deployment cancelled"
              ;;
            skipped)
              STATE=error
              DESCRIPTION="Phala deployment skipped"
              ;;
            *)
              STATE=failure
              DESCRIPTION="Phala deployment failed"
              ;;
          esac

          gh api \
            --method POST \
            "/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$STATE" \
            -f context="listen-backend - phala" \
            -f description="$DESCRIPTION" \
            -f target_url="$TARGET_URL"
