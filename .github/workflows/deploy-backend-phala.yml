name: Deploy Backend to Phala Cloud

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "packages/**"
      - "backend/Dockerfile"
      - "docker-compose.phala.yml"
      - "package.json"
      - "bun.lock"
      - "frontend/package.json"
      - "tsconfig.base.json"
      - "turbo.json"
      - ".github/workflows/deploy-backend-phala.yml"
  workflow_dispatch:

env:
  DOCKER_IMAGE: skgbafa/listen-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/amd64
          push: true
          no-cache: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
            ${{ env.DOCKER_IMAGE }}:latest

      - name: Pin deployed image tag
        run: sed -i "s|\${LISTEN_BACKEND_IMAGE:-skgbafa/listen-backend:latest}|${{ env.DOCKER_IMAGE }}:${{ github.sha }}|g" docker-compose.phala.yml

      - name: Install Phala CLI
        run: npm install -g phala

      - name: Get CVM ID by name
        id: cvm
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
        run: |
          CVM_APP_ID=$(phala cvms list --json | jq -r '.items[] | select(.cvmName == "listen-backend") | .appId')
          if [ -z "$CVM_APP_ID" ]; then
            echo "Error: CVM 'listen-backend' not found"
            exit 1
          fi
          echo "app_id=app_${CVM_APP_ID}" >> "$GITHUB_OUTPUT"
          echo "Found CVM: app_${CVM_APP_ID}"

      - name: Deploy to Phala Cloud
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
        run: phala deploy --cvm-id ${{ steps.cvm.outputs.app_id }} -c docker-compose.phala.yml

      - name: Wait for deployment
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
        run: |
          echo "Waiting for CVM to be ready (up to 10 minutes)..."
          for i in {1..60}; do
            RAW=$(phala cvms list --json | jq '.items[] | select(.cvmName == "listen-backend") | {status, cvmName}')
            STATUS=$(echo "$RAW" | jq -r '.status')
            echo "Attempt $i/60: Status = '$STATUS'"
            if [ "$STATUS" = "running" ]; then
              echo "CVM is running"
              exit 0
            fi
            if [ "$STATUS" = "failed" ] || [ "$STATUS" = "error" ]; then
              echo "CVM deployment failed with status: $STATUS"
              phala cvms list --json | jq '.items[] | select(.cvmName == "listen-backend")'
              exit 1
            fi
            sleep 10
          done
          echo "Timeout waiting for CVM after 10 minutes"
          phala cvms list --json | jq '.items[] | select(.cvmName == "listen-backend")'
          exit 1
