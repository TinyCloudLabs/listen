name: PR Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: listen-preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
  RAILWAY_SERVICE: ${{ vars.RAILWAY_SERVICE || 'listen-backend' }}
  RAILWAY_BASE_ENVIRONMENT: ${{ vars.RAILWAY_BASE_ENVIRONMENT || 'production' }}
  CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID || '9959301f03d2db1a5fcf5e004278d467' }}
  CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || 'listen' }}
  CLOUDFLARE_PAGES_SUBDOMAIN: ${{ vars.CLOUDFLARE_PAGES_SUBDOMAIN || vars.CLOUDFLARE_PAGES_PROJECT || 'listen' }}
  VITE_OPENKEY_HOST: ${{ vars.VITE_OPENKEY_HOST || 'https://openkey.so' }}
  OPENKEY_ISSUER_URL: ${{ vars.OPENKEY_ISSUER_URL || 'https://openkey.so' }}

jobs:
  deploy:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Derive preview names
        id: preview
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          BRANCH_ALIAS="pr-${PR_NUMBER}"
          RAILWAY_ENVIRONMENT="pr-${PR_NUMBER}"
          FRONTEND_URL="https://${BRANCH_ALIAS}.${CLOUDFLARE_PAGES_SUBDOMAIN%.pages.dev}.pages.dev"

          {
            echo "branch_alias=${BRANCH_ALIAS}"
            echo "railway_environment=${RAILWAY_ENVIRONMENT}"
            echo "frontend_url=${FRONTEND_URL}"
          } >> "$GITHUB_OUTPUT"

      - name: Check preview deploy configuration
        id: deploy_config
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          BACKEND_PRIVATE_KEY: ${{ secrets.LISTEN_PREVIEW_BACKEND_PRIVATE_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          missing=()
          for item in \
            "RAILWAY_PROJECT_ID:RAILWAY_PROJECT_ID" \
            "RAILWAY_API_TOKEN:RAILWAY_API_TOKEN" \
            "BACKEND_PRIVATE_KEY:LISTEN_PREVIEW_BACKEND_PRIVATE_KEY"; do
            env_name="${item%%:*}"
            config_name="${item##*:}"
            if [ -z "${!env_name}" ]; then
              missing+=("$config_name")
            fi
          done

          if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            echo "has_cloudflare=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_cloudflare=false" >> "$GITHUB_OUTPUT"
          fi

          if [ ${#missing[@]} -eq 0 ]; then
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
            echo "missing=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "can_deploy=false"
            echo "missing=${missing[*]}"
          } >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build backend
        run: bun run build --filter=listen-backend

      - name: Build frontend without deploy configuration
        if: steps.deploy_config.outputs.can_deploy != 'true'
        env:
          VITE_BACKEND_URL: https://preview-not-configured.invalid
          VITE_OPENKEY_HOST: ${{ env.VITE_OPENKEY_HOST }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.LISTEN_PREVIEW_GOOGLE_CLIENT_ID }}
          VITE_ENABLE_TINYCLOUD_HOOKS: ${{ vars.VITE_ENABLE_TINYCLOUD_HOOKS || 'false' }}
          VITE_ENABLE_AGENT: ${{ vars.VITE_ENABLE_AGENT || 'false' }}
        run: bun run build --filter=listen-frontend

      - name: Install Railway CLI
        if: steps.deploy_config.outputs.can_deploy == 'true'
        run: npm install -g @railway/cli@4.66.1

      - name: Deploy preview backend to Railway
        if: steps.deploy_config.outputs.can_deploy == 'true'
        id: railway
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          BACKEND_PRIVATE_KEY: ${{ secrets.LISTEN_PREVIEW_BACKEND_PRIVATE_KEY }}
          TINYCLOUD_HOST: ${{ vars.TINYCLOUD_HOST || 'https://node.tinycloud.xyz' }}
          GOOGLE_CLIENT_ID: ${{ secrets.LISTEN_PREVIEW_GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.LISTEN_PREVIEW_GOOGLE_CLIENT_SECRET }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.LISTEN_PREVIEW_GOOGLE_SERVICE_ACCOUNT_KEY }}
        run: |
          set -euo pipefail

          railway_graphql() {
            local query="$1"
            local variables="$2"
            local response

            response=$(jq -n \
              --arg query "$query" \
              --argjson variables "$variables" \
              '{query: $query, variables: $variables}' | \
              curl -fsS https://backboard.railway.com/graphql/v2 \
                -H "Authorization: Bearer ${RAILWAY_API_TOKEN}" \
                -H "Content-Type: application/json" \
                --data-binary @-)

            if [ "$(printf '%s' "$response" | jq '.errors | length')" != "0" ]; then
              printf '%s\n' "$response" | jq -r '.errors[].message' >&2
              return 1
            fi

            printf '%s' "$response"
          }

          PROJECT_QUERY=$(cat <<'GRAPHQL'
          query Project($id: String!) {
            project(id: $id) {
              id
              environments {
                edges {
                  node {
                    id
                    name
                    canAccess
                    deletedAt
                  }
                }
              }
              services {
                edges {
                  node {
                    id
                    name
                  }
                }
              }
            }
          }
          GRAPHQL
          )
          PROJECT_JSON=$(railway_graphql "$PROJECT_QUERY" "$(jq -n --arg id "$RAILWAY_PROJECT_ID" '{id: $id}')")

          BASE_ENVIRONMENT_ID=$(printf '%s' "$PROJECT_JSON" | jq -r \
            --arg env "$RAILWAY_BASE_ENVIRONMENT" \
            '[.data.project.environments.edges[].node | select(.deletedAt == null and .canAccess == true and (.id == $env or .name == $env))][0].id // empty')
          if [ -z "$BASE_ENVIRONMENT_ID" ]; then
            echo "Railway base environment not found: ${RAILWAY_BASE_ENVIRONMENT}" >&2
            exit 1
          fi

          RAILWAY_SERVICE_ID=$(printf '%s' "$PROJECT_JSON" | jq -r \
            --arg service "$RAILWAY_SERVICE" \
            '[.data.project.services.edges[].node | select(.id == $service or .name == $service)][0].id // empty')
          if [ -z "$RAILWAY_SERVICE_ID" ]; then
            echo "Railway service not found: ${RAILWAY_SERVICE}" >&2
            exit 1
          fi

          PREVIEW_ENVIRONMENT="${{ steps.preview.outputs.railway_environment }}"
          RAILWAY_ENVIRONMENT_ID=$(printf '%s' "$PROJECT_JSON" | jq -r \
            --arg env "$PREVIEW_ENVIRONMENT" \
            '[.data.project.environments.edges[].node | select(.deletedAt == null and .canAccess == true and (.id == $env or .name == $env))][0].id // empty')

          if [ -z "$RAILWAY_ENVIRONMENT_ID" ]; then
            ENVIRONMENT_CREATE_MUTATION=$(cat <<'GRAPHQL'
          mutation EnvironmentCreate($projectId: String!, $name: String!, $sourceId: String!, $applyChangesInBackground: Boolean) {
            environmentCreate(input: {projectId: $projectId, name: $name, sourceEnvironmentId: $sourceId, applyChangesInBackground: $applyChangesInBackground}) {
              id
              name
            }
          }
          GRAPHQL
          )
            ENVIRONMENT_JSON=$(railway_graphql "$ENVIRONMENT_CREATE_MUTATION" "$(jq -n \
              --arg projectId "$RAILWAY_PROJECT_ID" \
              --arg name "$PREVIEW_ENVIRONMENT" \
              --arg sourceId "$BASE_ENVIRONMENT_ID" \
              '{projectId: $projectId, name: $name, sourceId: $sourceId, applyChangesInBackground: false}')")
            RAILWAY_ENVIRONMENT_ID=$(printf '%s' "$ENVIRONMENT_JSON" | jq -r '.data.environmentCreate.id // empty')
          fi

          if [ -z "$RAILWAY_ENVIRONMENT_ID" ]; then
            echo "Failed to resolve Railway preview environment." >&2
            exit 1
          fi

          DOMAINS_QUERY=$(cat <<'GRAPHQL'
          query Domains($environmentId: String!, $projectId: String!, $serviceId: String!) {
            domains(environmentId: $environmentId, projectId: $projectId, serviceId: $serviceId) {
              serviceDomains {
                domain
              }
              customDomains {
                domain
              }
            }
          }
          GRAPHQL
          )
          DOMAINS_JSON=$(railway_graphql "$DOMAINS_QUERY" "$(jq -n \
            --arg projectId "$RAILWAY_PROJECT_ID" \
            --arg serviceId "$RAILWAY_SERVICE_ID" \
            --arg environmentId "$RAILWAY_ENVIRONMENT_ID" \
            '{projectId: $projectId, serviceId: $serviceId, environmentId: $environmentId}')")
          BACKEND_DOMAIN=$(printf '%s' "$DOMAINS_JSON" | jq -r '.data.domains.serviceDomains[0].domain // .data.domains.customDomains[0].domain // empty')

          if [ -z "$BACKEND_DOMAIN" ]; then
            SERVICE_DOMAIN_CREATE_MUTATION=$(cat <<'GRAPHQL'
          mutation ServiceDomainCreate($environmentId: String!, $serviceId: String!) {
            serviceDomainCreate(input: {environmentId: $environmentId, serviceId: $serviceId}) {
              domain
            }
          }
          GRAPHQL
          )
            DOMAIN_JSON=$(railway_graphql "$SERVICE_DOMAIN_CREATE_MUTATION" "$(jq -n \
              --arg serviceId "$RAILWAY_SERVICE_ID" \
              --arg environmentId "$RAILWAY_ENVIRONMENT_ID" \
              '{serviceId: $serviceId, environmentId: $environmentId}')")
            BACKEND_DOMAIN=$(printf '%s' "$DOMAIN_JSON" | jq -r '.data.serviceDomainCreate.domain // empty')
          fi

          if [ -z "$BACKEND_DOMAIN" ]; then
            echo "Failed to resolve Railway public domain." >&2
            exit 1
          fi
          BACKEND_URL="https://${BACKEND_DOMAIN#https://}"

          VARIABLES_MUTATION=$(cat <<'GRAPHQL'
          mutation VariableCollectionUpsert($projectId: String!, $serviceId: String!, $environmentId: String!, $variables: EnvironmentVariables!, $skipDeploys: Boolean) {
            variableCollectionUpsert(input: {projectId: $projectId, environmentId: $environmentId, serviceId: $serviceId, variables: $variables, skipDeploys: $skipDeploys})
          }
          GRAPHQL
          )
          railway_graphql "$VARIABLES_MUTATION" "$(jq -n \
            --arg projectId "$RAILWAY_PROJECT_ID" \
            --arg serviceId "$RAILWAY_SERVICE_ID" \
            --arg environmentId "$RAILWAY_ENVIRONMENT_ID" \
            --arg backendPrivateKey "$BACKEND_PRIVATE_KEY" \
            --arg tinycloudHost "$TINYCLOUD_HOST" \
            --arg frontendUrl "${{ steps.preview.outputs.frontend_url }}" \
            --arg openkeyIssuerUrl "$OPENKEY_ISSUER_URL" \
            --arg googleClientId "$GOOGLE_CLIENT_ID" \
            --arg googleClientSecret "$GOOGLE_CLIENT_SECRET" \
            --arg googleServiceAccountKey "$GOOGLE_SERVICE_ACCOUNT_KEY" \
            --arg googlePubsubPushUrl "${BACKEND_URL}/api/webhooks/google-meet" \
            '{
              projectId: $projectId,
              serviceId: $serviceId,
              environmentId: $environmentId,
              skipDeploys: true,
              variables: {
                RAILWAY_DOCKERFILE_PATH: "backend/Dockerfile",
                RAILPACK_CONFIG_FILE: "railpack.json",
                RAILPACK_START_CMD: "if [ -d backend ]; then bun run --cwd backend start; else bun run start; fi",
                NODE_ENV: "production",
                PORT: "3001",
                BACKEND_PRIVATE_KEY: $backendPrivateKey,
                TINYCLOUD_HOST: $tinycloudHost,
                FRONTEND_URL: $frontendUrl,
                OPENKEY_ISSUER_URL: $openkeyIssuerUrl,
                GOOGLE_CLIENT_ID: $googleClientId,
                GOOGLE_CLIENT_SECRET: $googleClientSecret,
                GOOGLE_SERVICE_ACCOUNT_KEY: $googleServiceAccountKey,
                GOOGLE_PUBSUB_PUSH_URL: $googlePubsubPushUrl
              }
            }')" >/dev/null

          UP_JSON=$(railway up \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT_ID" \
            --service "$RAILWAY_SERVICE_ID" \
            --detach \
            --json \
            --message "TC-1367 PR #${{ github.event.pull_request.number }} preview" \
            2>/tmp/railway-up.err) || {
            cat /tmp/railway-up.err >&2 || true
            exit 1
          }
          DEPLOYMENT_ID=$(printf '%s' "$UP_JSON" | jq -r '.deploymentId // empty')
          if [ -z "$DEPLOYMENT_ID" ]; then
            echo "Railway upload did not return a deployment ID." >&2
            cat /tmp/railway-up.err >&2 || true
            printf '%s\n' "$UP_JSON" >&2
            exit 1
          fi

          DEPLOYMENT_QUERY=$(cat <<'GRAPHQL'
          query Deployment($id: String!) {
            deployment(id: $id) {
              id
              status
            }
          }
          GRAPHQL
          )
          for attempt in $(seq 1 90); do
            STATUS=$(railway_graphql "$DEPLOYMENT_QUERY" "$(jq -n --arg id "$DEPLOYMENT_ID" '{id: $id}')" | jq -r '.data.deployment.status // "UNKNOWN"')
            echo "Railway deployment status: ${STATUS}"
            case "$STATUS" in
              SUCCESS)
                break
                ;;
              FAILED|CRASHED|REMOVED|REMOVING)
                echo "Railway deployment failed; fetching build and deploy logs." >&2
                railway logs --environment "$RAILWAY_ENVIRONMENT_ID" --service "$RAILWAY_SERVICE_ID" --build --lines 200 "$DEPLOYMENT_ID" || true
                railway logs --environment "$RAILWAY_ENVIRONMENT_ID" --service "$RAILWAY_SERVICE_ID" --deployment --lines 100 "$DEPLOYMENT_ID" || true
                exit 1
                ;;
            esac
            if [ "$attempt" -eq 90 ]; then
              echo "Timed out waiting for Railway deployment." >&2
              exit 1
            fi
            sleep 10
          done

          echo "backend_url=${BACKEND_URL}" >> "$GITHUB_OUTPUT"

      - name: Build preview frontend
        if: steps.deploy_config.outputs.can_deploy == 'true'
        env:
          VITE_BACKEND_URL: ${{ steps.railway.outputs.backend_url }}
          VITE_OPENKEY_HOST: ${{ env.VITE_OPENKEY_HOST }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.LISTEN_PREVIEW_GOOGLE_CLIENT_ID }}
          VITE_ENABLE_TINYCLOUD_HOOKS: ${{ vars.VITE_ENABLE_TINYCLOUD_HOOKS || 'false' }}
          VITE_ENABLE_AGENT: ${{ vars.VITE_ENABLE_AGENT || 'false' }}
        run: bun run build --filter=listen-frontend

      - uses: actions/setup-node@v4
        if: steps.deploy_config.outputs.can_deploy == 'true' && steps.deploy_config.outputs.has_cloudflare == 'true'
        with:
          node-version: 22

      - name: Deploy preview frontend to Cloudflare Pages
        if: steps.deploy_config.outputs.can_deploy == 'true' && steps.deploy_config.outputs.has_cloudflare == 'true'
        id: cloudflare
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          bunx wrangler pages deploy frontend/dist \
            --project-name "$CLOUDFLARE_PAGES_PROJECT" \
            --branch "${{ steps.preview.outputs.branch_alias }}" \
            --commit-hash "${{ github.event.pull_request.head.sha }}" \
            --commit-message "TC-1367 PR #${{ github.event.pull_request.number }} preview"

      - name: Comment preview URLs
        if: steps.deploy_config.outputs.can_deploy == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- listen-pr-preview -->';
            const cloudflareOutcome = '${{ steps.cloudflare.outcome }}';
            const frontend =
              cloudflareOutcome === 'success'
                ? '${{ steps.preview.outputs.frontend_url }}'
                : `not deployed (${cloudflareOutcome || 'Cloudflare token not configured'})`;
            const body = `${marker}
            TC-1367 preview is deployed.

            Frontend: ${frontend}
            Backend: ${{ steps.railway.outputs.backend_url }}
            Railway environment: \`${{ steps.preview.outputs.railway_environment }}\``;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Fail when frontend preview deploy fails
        if: steps.deploy_config.outputs.can_deploy == 'true' && steps.deploy_config.outputs.has_cloudflare == 'true' && steps.cloudflare.outcome != 'success'
        run: |
          echo "Frontend preview deploy did not succeed: ${{ steps.cloudflare.outcome }}" >&2
          exit 1

      - name: Comment waiting for preview configuration
        if: steps.deploy_config.outputs.can_deploy != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- listen-pr-preview -->';
            const missing = '${{ steps.deploy_config.outputs.missing }}'
              .split(' ')
              .filter(Boolean)
              .map((name) => `\`${name}\``)
              .join(', ');
            const body = `${marker}
            TC-1367 preview backend and frontend builds passed.

            Preview deployment is waiting for repository configuration: ${missing}.`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  skipped-fork:
    if: github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment skipped preview
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'TC-1367 preview was skipped because this PR comes from a fork and preview deployment requires repository secrets.',
            });
