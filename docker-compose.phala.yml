services:
  listen-backend:
    image: ${LISTEN_BACKEND_IMAGE:-ghcr.io/tinycloudlabs/listen-backend:latest}
    platform: linux/amd64
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      BACKEND_PRIVATE_KEY: ${BACKEND_PRIVATE_KEY}
      TINYCLOUD_HOST: ${TINYCLOUD_HOST:-https://tee.node.tinycloud.xyz}
      FRONTEND_URL: ${FRONTEND_URL:-https://listen.tinycloud.xyz}
      OPENKEY_ISSUER_URL: ${OPENKEY_ISSUER_URL:-https://openkey.so}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_SERVICE_ACCOUNT_KEY: ${GOOGLE_SERVICE_ACCOUNT_KEY:-}
      GOOGLE_PUBSUB_PUSH_URL: ${GOOGLE_PUBSUB_PUSH_URL:-}
      LISTEN_BUILD_SHA: ${LISTEN_BUILD_SHA:-}
      LISTEN_DEPLOY_RUN_URL: ${LISTEN_DEPLOY_RUN_URL:-}
    restart: unless-stopped

  dstack-ingress:
    image: ${LISTEN_INGRESS_IMAGE:-ghcr.io/tinycloudlabs/listen-backend:ingress-latest}
    ports:
      - "443:443"
    depends_on:
      - listen-backend
    environment:
      DOMAIN: ${PHALA_INGRESS_DOMAIN:-api.listen.tinycloud.xyz}
      TARGET_ENDPOINT: http://listen-backend:3001
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      GATEWAY_DOMAIN: ${PHALA_GATEWAY_CNAME}
      CERTBOT_EMAIL: ${CERTBOT_EMAIL}
      SET_CAA: "true"
      DNS_PROVIDER: cloudflare
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
      - cert-data:/etc/letsencrypt
    restart: unless-stopped

volumes:
  cert-data:
