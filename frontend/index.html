<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Listen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply saved/system theme before first paint to avoid a flash.
      // Must mirror lib/theme.ts (same key, attribute, default). Light is
      // the default (no data-theme); dark sets data-theme="dark". With no
      // saved choice we follow prefers-color-scheme.
      (function () {
        try {
          var saved = localStorage.getItem("listen:theme");
          var dark =
            saved === "dark" ||
            (saved !== "light" &&
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.dataset.theme = "dark";
        } catch (_e) {}
      })();
    </script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: #f2f2f4;
        -webkit-font-smoothing: antialiased;
      }
      html[data-theme="dark"] body {
        background: #1a1b26;
      }
      ::selection {
        background: rgba(28, 53, 184, 0.18);
      }
      input:focus {
        outline: none;
        border-color: #1c35b8 !important;
        box-shadow: 0 0 0 3px rgba(28, 53, 184, 0.12);
      }
      button {
        transition:
          opacity 0.15s,
          background 0.15s,
          transform 0.08s;
      }
      button:active:not(:disabled) {
        transform: scale(0.97);
      }
      @keyframes syncPulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
      @keyframes shimmer {
        0% {
          background-position: -200% 0;
        }
        100% {
          background-position: 200% 0;
        }
      }
      @keyframes fadeSlideIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes scanline {
        0% {
          left: -2px;
        }
        100% {
          left: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
