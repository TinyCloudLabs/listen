<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Listen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply saved/system palette before first paint to avoid a flash.
      // Must mirror lib/theme.ts (same key, attribute, palette ids, and
      // default). Default is herdr-light; herdr-dark is the dark fallback.
      (function () {
        var THEMES = [
          "herdr-light",
          "herdr-dark",
          "tokyo-night",
          "catppuccin",
          "nord",
          "gruvbox",
          "classic",
        ];
        try {
          var saved = localStorage.getItem("listen:theme");
          var theme =
            THEMES.indexOf(saved) !== -1
              ? saved
              : window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "herdr-dark"
                : "herdr-light";
          document.documentElement.dataset.theme = theme;
        } catch (_e) {
          document.documentElement.dataset.theme = "herdr-light";
        }
      })();
    </script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: #f0eee9;
        -webkit-font-smoothing: antialiased;
      }
      html[data-theme="herdr-dark"] body {
        background: #0c0c0b;
      }
      html[data-theme="tokyo-night"] body {
        background: #1a1b26;
      }
      html[data-theme="catppuccin"] body {
        background: #11111b;
      }
      html[data-theme="nord"] body {
        background: #2e3440;
      }
      html[data-theme="gruvbox"] body {
        background: #282828;
      }
      html[data-theme="classic"] body {
        background: #f2f2f4;
      }
      ::selection {
        background: rgba(74, 158, 255, 0.18);
      }
      input:focus {
        outline: none;
        border-color: #4a9eff !important;
        box-shadow: 0 0 0 3px rgba(74, 158, 255, 0.12);
      }
      button {
        transition:
          opacity 0.15s,
          background 0.15s,
          transform 0.08s;
      }
      button:active:not(:disabled) {
        transform: scale(0.97);
      }
      @keyframes syncPulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
      @keyframes shimmer {
        0% {
          background-position: -200% 0;
        }
        100% {
          background-position: 200% 0;
        }
      }
      @keyframes fadeSlideIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes scanline {
        0% {
          left: -2px;
        }
        100% {
          left: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
