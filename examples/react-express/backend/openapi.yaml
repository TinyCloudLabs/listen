# Keep in sync with:
#   - packages/core/src/index.ts (types)
#   - examples/react-express/backend/src/routes/ (endpoints)

openapi: 3.1.0
info:
  title: TinyBoilerplate API
  version: 0.1.0
  description: |
    Example API for the TinyBoilerplate project.
    Demonstrates JWT auth (OpenKey) + TinyCloud delegation patterns.

    **Two-layer auth:**
    1. Bearer JWT from OpenKey (OAuth 2.1 PKCE + passkeys)
    2. TinyCloud PortableDelegation granting scoped backend access

servers:
  - url: http://localhost:3001
    description: Local development

# ── Security ────────────────────────────────────────────────────────

security:
  - bearerAuth: []

# ── Paths ───────────────────────────────────────────────────────────

paths:
  /api/server-info:
    get:
      operationId: getServerInfo
      summary: Get backend DID and status
      description: Returns the backend's DID for delegation creation. No auth required.
      security: []
      tags: [Server]
      responses:
        "200":
          description: Backend info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerInfo"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/delegations:
    post:
      operationId: sendDelegation
      summary: Submit a delegation to the backend
      description: |
        Receive a serialized PortableDelegation, verify it, and store it.
        The delegation is activated immediately and cached.
      tags: [Delegations]
      parameters:
        - $ref: "#/components/parameters/CsrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [serialized]
              properties:
                serialized:
                  type: string
                  description: Serialized PortableDelegation string
      responses:
        "200":
          description: Delegation stored and activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DelegationResponse"
        "400":
          description: Invalid body or delegation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                invalidBody:
                  value:
                    error: invalid_body
                    message: "Request body must include a 'serialized' string field"
                invalidDelegation:
                  value:
                    error: invalid_delegation
                    message: Failed to process delegation
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/CsrfRejected"
        "429":
          $ref: "#/components/responses/DelegationRateLimited"

    delete:
      operationId: revokeDelegation
      summary: Revoke the current delegation
      description: Removes the stored delegation and evicts the cache entry.
      tags: [Delegations]
      parameters:
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "200":
          description: Delegation revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DelegationResponse"
              example:
                status: none
                expiresAt: null
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/CsrfRejected"
        "429":
          $ref: "#/components/responses/DelegationRateLimited"
        "500":
          description: Revocation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/delegations/status:
    get:
      operationId: getDelegationStatus
      summary: Check delegation status
      description: |
        Returns whether an active delegation exists for the authenticated user.
        Auto-cleans expired delegations.
      tags: [Delegations]
      responses:
        "200":
          description: Delegation status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DelegationResponse"
              examples:
                active:
                  value:
                    status: active
                    expiresAt: "2026-03-28T12:00:00.000Z"
                expired:
                  value:
                    status: expired
                    expiresAt: "2026-03-20T12:00:00.000Z"
                none:
                  value:
                    status: none
                    expiresAt: null
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "429":
          $ref: "#/components/responses/DelegationRateLimited"

  /api/items:
    get:
      operationId: listItems
      summary: List all items
      tags: [Items]
      parameters:
        - $ref: "#/components/parameters/StoreType"
        - name: search
          in: query
          description: Search term for title and data (SQL store only)
          schema:
            type: string
        - name: sort
          in: query
          description: Sort field (SQL store only)
          schema:
            type: string
            enum: [title, created_at, updated_at]
            default: created_at
        - name: dir
          in: query
          description: Sort direction (SQL store only)
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        "200":
          description: List of items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemListResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/NoDelegation"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/StoreError"
        "504":
          $ref: "#/components/responses/GatewayTimeout"

    post:
      operationId: createItem
      summary: Create a new item
      tags: [Items]
      parameters:
        - $ref: "#/components/parameters/StoreType"
        - $ref: "#/components/parameters/CsrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateItemInput"
      responses:
        "201":
          description: Item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemResponse"
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error: invalid_body
                message: "Request body must include a 'title' string field"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/NoDelegation"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/StoreError"
        "504":
          $ref: "#/components/responses/GatewayTimeout"

  /api/items/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Item ID

    get:
      operationId: getItem
      summary: Get a single item
      tags: [Items]
      parameters:
        - $ref: "#/components/parameters/StoreType"
      responses:
        "200":
          description: Item found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/NoDelegation"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/StoreError"
        "504":
          $ref: "#/components/responses/GatewayTimeout"

    put:
      operationId: updateItem
      summary: Update an item
      tags: [Items]
      parameters:
        - $ref: "#/components/parameters/StoreType"
        - $ref: "#/components/parameters/CsrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateItemInput"
      responses:
        "200":
          description: Item updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemResponse"
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error: invalid_body
                message: "Request body must include at least 'title' or 'data'"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/NoDelegation"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/StoreError"
        "504":
          $ref: "#/components/responses/GatewayTimeout"

    delete:
      operationId: deleteItem
      summary: Delete an item
      tags: [Items]
      parameters:
        - $ref: "#/components/parameters/StoreType"
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "204":
          description: Item deleted (no content)
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/NoDelegation"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/StoreError"
        "504":
          $ref: "#/components/responses/GatewayTimeout"

# ── Components ──────────────────────────────────────────────────────

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: OpenKey JWT access token (OAuth 2.1 PKCE)

  parameters:
    StoreType:
      name: store
      in: query
      description: Storage backend to use
      schema:
        type: string
        enum: [kv, sql]
        default: kv

    CsrfHeader:
      name: X-Requested-With
      in: header
      required: true
      description: CSRF protection header (required for state-changing methods)
      schema:
        type: string
        default: TinyBoilerplate

  schemas:
    Item:
      type: object
      required: [id, title, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        data:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateItemInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
        data:
          type: string

    UpdateItemInput:
      type: object
      properties:
        title:
          type: string
        data:
          type: string

    ItemResponse:
      type: object
      required: [item]
      properties:
        item:
          $ref: "#/components/schemas/Item"

    ItemListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Item"

    DelegationResponse:
      type: object
      required: [status, expiresAt]
      properties:
        status:
          type: string
          enum: [active, expired, none]
        expiresAt:
          type: string
          format: date-time
          nullable: true

    ServerInfo:
      type: object
      required: [did, status]
      properties:
        did:
          type: string
          description: "Backend DID (e.g. did:pkh:eip155:1:0x...)"
        status:
          type: string

    ApiError:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          description: Machine-readable error code
        message:
          type: string
          description: Human-readable error description

  responses:
    Unauthenticated:
      description: Missing or invalid JWT token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error: missing_token
            message: Authorization header is required

    CsrfRejected:
      description: Missing or invalid X-Requested-With header
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error: csrf_rejected
            message: Missing or invalid X-Requested-With header

    NoDelegation:
      description: No active delegation for this user
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error: no_delegation
            message: Delegation required

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error: not_found
            message: "Item 'abc-123' not found"

    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error: rate_limited
            message: Too many requests

    DelegationRateLimited:
      description: Too many delegation requests (10 per 15 minutes)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error: rate_limited
            message: Too many delegation requests

    StoreError:
      description: Storage operation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error: store_error
            message: Failed to list items

    GatewayTimeout:
      description: TinyCloud operation timed out
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error: gateway_timeout
            message: TinyCloud operation timed out
