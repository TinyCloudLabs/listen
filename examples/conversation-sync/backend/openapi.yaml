# Keep in sync with:
#   - examples/conversation-sync/backend/src/routes/ (endpoints)

openapi: 3.1.0
info:
  title: Conversation Sync API
  version: 0.1.0
  description: |
    Conversation Sync — sync meeting transcripts to your TinyCloud space.

    **Two-layer auth:**
    1. Bearer JWT from OpenKey (OAuth 2.1 PKCE + passkeys)
    2. TinyCloud PortableDelegation granting scoped backend access

servers:
  - url: http://localhost:3001
    description: Local development

# ── Security ────────────────────────────────────────────────────────

security:
  - bearerAuth: []

# ── Paths ───────────────────────────────────────────────────────────

paths:
  /api/server-info:
    get:
      operationId: getServerInfo
      summary: Get backend DID and status
      description: Returns the backend's DID for delegation creation. No auth required.
      security: []
      tags: [Server]
      responses:
        "200":
          description: Backend info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerInfo"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/delegations:
    post:
      operationId: sendDelegation
      summary: Submit a delegation to the backend
      description: |
        Receive a serialized PortableDelegation, verify it, and store it.
        The delegation is activated immediately and cached.
      tags: [Delegations]
      parameters:
        - $ref: "#/components/parameters/CsrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [serialized]
              properties:
                serialized:
                  type: string
                  description: Serialized PortableDelegation string
      responses:
        "200":
          description: Delegation stored and activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DelegationResponse"
        "400":
          description: Invalid body or delegation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                invalidBody:
                  value:
                    error: invalid_body
                    message: "Request body must include a 'serialized' string field"
                invalidDelegation:
                  value:
                    error: invalid_delegation
                    message: Failed to process delegation
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/CsrfRejected"
        "429":
          $ref: "#/components/responses/DelegationRateLimited"

    delete:
      operationId: revokeDelegation
      summary: Revoke the current delegation
      description: Removes the stored delegation and evicts the cache entry.
      tags: [Delegations]
      parameters:
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "200":
          description: Delegation revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DelegationResponse"
              example:
                status: none
                expiresAt: null
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/CsrfRejected"
        "429":
          $ref: "#/components/responses/DelegationRateLimited"
        "500":
          description: Revocation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/delegations/status:
    get:
      operationId: getDelegationStatus
      summary: Check delegation status
      description: |
        Returns whether an active delegation exists for the authenticated user.
        Auto-cleans expired delegations.
      tags: [Delegations]
      responses:
        "200":
          description: Delegation status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DelegationResponse"
              examples:
                active:
                  value:
                    status: active
                    expiresAt: "2026-03-28T12:00:00.000Z"
                expired:
                  value:
                    status: expired
                    expiresAt: "2026-03-20T12:00:00.000Z"
                none:
                  value:
                    status: none
                    expiresAt: null
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "429":
          $ref: "#/components/responses/DelegationRateLimited"

  # ── Webhook endpoints ─────────────────────────────────────────────

  /api/webhooks/fireflies:
    post:
      operationId: receiveFirefliesWebhook
      summary: Receive Fireflies webhook
      description: |
        Public endpoint for Fireflies webhook callbacks. Verifies HMAC-SHA256
        signature via `x-hub-signature` header before processing.

        When delegation is active, immediately fetches and stores the transcript.
        When delegation is expired or API key is missing, queues the meetingId
        as pending for later processing.
      security: []
      tags: [Webhooks]
      parameters:
        - name: x-hub-signature
          in: header
          required: true
          description: "HMAC-SHA256 signature in format: sha256={hex}"
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [meetingId, eventType]
              properties:
                meetingId:
                  type: string
                  description: Fireflies meeting identifier
                eventType:
                  type: string
                  description: "Event type (only 'Transcription completed' is processed)"
      responses:
        "200":
          description: Webhook accepted
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/WebhookProcessed"
                  - $ref: "#/components/schemas/WebhookPending"
                  - $ref: "#/components/schemas/WebhookIgnored"
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                missingMeetingId:
                  value:
                    error: missing_meeting_id
                    message: meetingId is required for transcription events
        "401":
          description: Invalid or missing HMAC signature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                invalidSignature:
                  value:
                    error: invalid_signature
                    message: Invalid or missing HMAC signature
                noSecret:
                  value:
                    error: no_webhook_secret
                    message: Webhook secret not configured
        "500":
          description: Processing error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/webhooks/fireflies/pending:
    get:
      operationId: processFirefliesPending
      summary: Process pending webhook items
      description: |
        Processes all queued meetingIds from webhooks received while delegation
        was expired. Requires active delegation and Fireflies API key.

        Successfully processed and deduplicated items are removed from the queue.
        Failed items are retained for retry.
      tags: [Webhooks]
      responses:
        "200":
          description: Processing results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PendingProcessResult"
        "400":
          description: Fireflies API key not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error: no_api_key
                message: Fireflies API key not configured
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/NoDelegation"

    delete:
      operationId: clearFirefliesPending
      summary: Clear all pending webhook items
      description: Removes all queued meetingIds without processing them.
      tags: [Webhooks]
      responses:
        "200":
          description: Queue cleared
          content:
            application/json:
              schema:
                type: object
                required: [cleared]
                properties:
                  cleared:
                    type: integer
                    description: Number of items removed
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/NoDelegation"

  # ── Webhook config endpoints ───────────────────────────────────────

  /api/config/webhook-secret:
    put:
      operationId: setWebhookSecret
      summary: Set the Fireflies webhook secret
      description: |
        Stores the HMAC webhook secret in the backend's own KV store
        (not the user's delegated space). Used for signature verification
        on incoming webhooks. Requires JWT auth only (no delegation needed).
      tags: [Config]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [secret]
              properties:
                secret:
                  type: string
                  description: Webhook secret string for HMAC verification
      responses:
        "200":
          description: Secret stored
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
              example:
                ok: true
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                error: invalid_body
                message: "Request body must include a 'secret' string field"
        "401":
          $ref: "#/components/responses/Unauthenticated"

  /api/config/webhook-status:
    get:
      operationId: getWebhookStatus
      summary: Get webhook configuration status
      description: |
        Returns whether a webhook secret is configured, the count of pending
        items, and the webhook URL to register with Fireflies.
      tags: [Config]
      responses:
        "200":
          description: Webhook status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookStatus"
        "401":
          $ref: "#/components/responses/Unauthenticated"

# ── Components ──────────────────────────────────────────────────────

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: OpenKey JWT access token (OAuth 2.1 PKCE)

  parameters:
    CsrfHeader:
      name: X-Requested-With
      in: header
      required: true
      description: CSRF protection header (required for state-changing methods)
      schema:
        type: string
        default: TinyBoilerplate

  schemas:
    DelegationResponse:
      type: object
      required: [status, expiresAt]
      properties:
        status:
          type: string
          enum: [active, expired, none]
        expiresAt:
          type: string
          format: date-time
          nullable: true

    ServerInfo:
      type: object
      required: [did, status]
      properties:
        did:
          type: string
          description: "Backend DID (e.g. did:pkh:eip155:1:0x...)"
        status:
          type: string

    ApiError:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          description: Machine-readable error code
        message:
          type: string
          description: Human-readable error description

    WebhookProcessed:
      type: object
      required: [status, meetingId]
      properties:
        status:
          type: string
          enum: [processed]
        meetingId:
          type: string
        conversationId:
          type: string
        title:
          type: string

    WebhookPending:
      type: object
      required: [status, reason]
      properties:
        status:
          type: string
          enum: [pending]
        reason:
          type: string
          enum: [delegation_expired, no_api_key]

    WebhookIgnored:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ignored]
        eventType:
          type: string

    SyncResult:
      type: object
      required: [status, meetingId]
      properties:
        status:
          type: string
          enum: [created, skipped, error]
        meetingId:
          type: string
        conversationId:
          type: string
        title:
          type: string
        startedAt:
          type: string
          format: date-time
        error:
          type: string

    PendingProcessResult:
      type: object
      required: [processed, skipped, errors]
      properties:
        processed:
          type: array
          items:
            $ref: "#/components/schemas/SyncResult"
        skipped:
          type: array
          items:
            $ref: "#/components/schemas/SyncResult"
        errors:
          type: array
          items:
            $ref: "#/components/schemas/SyncResult"

    WebhookStatus:
      type: object
      required: [configured, pendingCount, webhookUrl]
      properties:
        configured:
          type: boolean
          description: Whether a webhook secret is configured
        pendingCount:
          type: integer
          description: Number of pending items in the queue
        webhookUrl:
          type: string
          description: URL to register in Fireflies dashboard

  responses:
    Unauthenticated:
      description: Missing or invalid JWT token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error: missing_token
            message: Authorization header is required

    CsrfRejected:
      description: Missing or invalid X-Requested-With header
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error: csrf_rejected
            message: Missing or invalid X-Requested-With header

    NoDelegation:
      description: No active delegation for this user
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error: no_delegation
            message: Delegation required

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error: not_found
            message: Resource not found

    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error: rate_limited
            message: Too many requests

    DelegationRateLimited:
      description: Too many delegation requests (10 per 15 minutes)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error: rate_limited
            message: Too many delegation requests

    StoreError:
      description: Storage operation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error: store_error
            message: Failed to list items

    GatewayTimeout:
      description: TinyCloud operation timed out
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error: gateway_timeout
            message: TinyCloud operation timed out
